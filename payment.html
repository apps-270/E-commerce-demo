<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - ShopHub</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body onload="applyDark();">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="fas fa-shopping-bag"></i>
            ShopHub
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Right Side -->
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="shop.html">
                        <i class="fas fa-store me-1"></i> Shop
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="cart.html">
                        <i class="fas fa-shopping-cart me-1"></i> Cart (<span id="cartCount">0</span>)
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="order.html">
                        <i class="fas fa-box me-1"></i> Orders
                    </a>
                </li>
                <li class="nav-item">
                    <button onclick="toggleDark()" class="btn btn-link nav-link">
                        <i class="fas fa-moon"></i>
                    </button>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="#" onclick="logout()">
                        <i class="fas fa-sign-out-alt me-1"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ================= PAYMENT SECTION ================= -->
<section class="py-5 mt-5">
    <div class="container">
        <div class="payment-container">
            <div class="payment-header">
                <h2><i class="fas fa-lock me-2"></i>Secure Payment</h2>
                <p class="mb-0">Complete your purchase securely</p>
            </div>
            <div class="payment-body">
                <!-- Card Icons -->
                <div class="card-icons">
                    <div class="card-icon">VISA</div>
                    <div class="card-icon">MC</div>
                    <div class="card-icon">AMEX</div>
                    <div class="card-icon">PayPal</div>
                </div>
                
                <form onsubmit="event.preventDefault(); completePayment();">
                    <div class="card-input-group">
                        <i class="fas fa-credit-card"></i>
                        <input type="text" id="cardNumber" class="form-input" placeholder="Card Number" maxlength="19">
                    </div>
                    
                    <div class="row">
                        <div class="col-6">
                            <div class="card-input-group">
                                <i class="fas fa-calendar"></i>
                                <input type="text" id="expiry" class="form-input" placeholder="MM/YY" maxlength="5">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="card-input-group">
                                <i class="fas fa-lock"></i>
                                <input type="text" id="cvv" class="form-input" placeholder="CVV" maxlength="4">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Cardholder Name</label>
                        <input type="text" class="form-input" placeholder="Name on card">
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-check me-2"></i>Pay Now
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="cart.html" class="text-muted">
                        <i class="fas fa-arrow-left me-1"></i> Back to Cart
                    </a>
                </div>
                
                <div class="text-center mt-3">
                    <p class="text-muted small">
                        <i class="fas fa-shield-alt me-1"></i>
                        Your payment information is encrypted and secure
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<script src="script.js"></script>

</body>
</html>
