<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ShopHub</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="form-container">

<div class="form-card">
    <div class="text-center mb-4">
        <a href="index.html" class="navbar-brand mb-3 d-inline-block">
            <i class="fas fa-shopping-bag"></i>
            ShopHub
        </a>
    </div>
    
    <h2 class="form-title">Create Account</h2>
    <p class="form-subtitle">Join us and start shopping</p>
    
    <form onsubmit="event.preventDefault(); register();">
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <div class="card-input-group">
                <i class="fas fa-user"></i>
                <input type="text" class="form-input" placeholder="Enter your name" required>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="card-input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="regEmail" class="form-input" placeholder="Enter your email" required>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="card-input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPass" class="form-input" placeholder="Create a password" required>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="card-input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regConfirmPass" class="form-input" placeholder="Confirm your password" required>
            </div>
        </div>
        
        <div class="form-check mb-4">
            <input type="checkbox" class="form-check-input" id="terms" required>
            <label class="form-check-label" for="terms">
                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>
        </div>
        
        <button type="submit" class="btn-submit">
            <i class="fas fa-user-plus me-2"></i>Create Account
        </button>
    </form>
    
    <p class="form-footer">
        Already have an account? <a href="login.html">Sign in</a>
    </p>
    
    <div class="text-center mt-4">
        <a href="index.html" class="text-muted">
            <i class="fas fa-arrow-left me-1"></i> Back to Home
        </a>
    </div>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<script src="script.js"></script>

</body>
</html>
