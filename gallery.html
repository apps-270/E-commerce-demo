<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Gallery</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
margin:10px 0;
}

button{
background:#007bff;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<h1>Product Gallery</h1>

<div class="gallery">

<div class="card">
<img src="https://images.unsplash.com/photo-1518441902112-1b6b7bcb1d32?w=500">
<h3>Wireless Headphones</h3>
<p class="price">₹2499</p>
<button onclick="buy('Wireless Headphones')">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?w=500">
<h3>Smart Watch</h3>
<p class="price">₹3999</p>
<button onclick="buy('Smart Watch')">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=500">
<h3>Gaming Mouse</h3>
<p class="price">₹1299</p>
<button onclick="buy('Gaming Mouse')">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=500">
<h3>Laptop</h3>
<p class="price">₹59999</p>
<button onclick="buy('Laptop')">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500">
<h3>Sneakers</h3>
<p class="price">₹1999</p>
<button onclick="buy('Sneakers')">Buy Now</button>
</div>

</div>

<script>

function buy(product){
alert(product + " added to cart!");
}

</script>

</body>
</html>
